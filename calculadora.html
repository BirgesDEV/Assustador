<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título da Página</title>
    <style>
        .campo{
            background-color: darkcyan;
            border:4px solid blue;
        }
        .botao{
            width:5% ;
            height: 3%;
            background-color: blue;
            border:4px solid darkcyan ;
        }
        .botaox{
            width:5% ;
            height: 3%;
            background-color: rgb(0, 229, 255);
            border:4px solid rgb(15, 83, 77) ;
        }
        .botao3{
            width:13% ;
            height: 3%;
            background-color: rgb(105, 178, 186);
            border:4px solid rgb(98, 231, 220) ;
        }
        .botao4{
            width:13% ;
            height: 3%;
            background-color: rgb(54, 56, 127);
            border:4px solid rgb(31, 75, 136) ;
        }
    </style>
    <script>
    function adicionar(valor){
       document.getElementById("campo").value += valor;}

        function limpar(){
            document.getElementById("campo").value = "";
    }
    </script>
</head>
<body>
   <fieldset>
      <legend>calculadora do 2°A</legend>
      <input type="text" id="campo" class="campo"><br><br>
      <button onclick="adicionar('1')" class="botao">1</button> 
      <button onclick="adicionar('2')"class="botao">2</button>
      <button onclick="adicionar('3')"class="botao">3</button>
      <button onclick="adicionar('*')"class="botaox">*</button>
      <button onclick="adicionar('^')"class="botaox">^</button>
      <br>
      <button onclick="adicionar('4')"class="botao">4</button>
      <button onclick="adicionar('5')"class="botao">5</button>
      <button onclick="adicionar('6')"class="botao">6</button>
      <button onclick="adicionar('/')"class="botaox">/</button>
      <button onclick="adicionar('(')"class="botaox">(</button>
      <br>
      <button onclick="adicionar('7')"class="botao">7</button>
      <button onclick="adicionar('8')"class="botao">8</button>
      <button onclick="adicionar('9')"class="botao">9</button>
      <button onclick="adicionar('+')"class="botaox">+</button>
      <button onclick="adicionar(')')"class="botaox">)</button>
      <br>
      <button onclick="adicionar('x')"class="botaox">x</button>
      <button onclick="adicionar('0')"class="botao">0</button>
      <button onclick="adicionar('#')"class="botaox">#</button>
      <button onclick="adicionar('-')"class="botaox">-</button>
      <button onclick="adicionar('%')"class="botaox">%</button>
      <br>
      <button onclick="limpar()"class="botao4">c</button>
      <button onclick="adicionar('=')"class="botao3">=</button>
   </fieldset> 
</body>
</html>
